<!DOCTYPE html>
<html lang="en" data-theme="{{ theme | default('dark') }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title | default('Report') }}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/Chart.min.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <style>
    :root[data-theme="dark"] {
      --bg: #0f172a; --bg-sec: #1e293b; --text: #f8fafc; --text-sec: #94a3b8;
      --border: #334155; --brand: #0d9488; --info: #3b82f6; --accent: {{ accent | default('#0d9488') }};
    }
    :root[data-theme="light"] {
      --bg: #ffffff; --bg-sec: #f1f5f9; --text: #0f172a; --text-sec: #64748b;
      --border: #e2e8f0; --brand: #0d9488; --info: #3b82f6; --accent: {{ accent | default('#0d9488') }};
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; }
    .container { display: flex; min-height: 100vh; }
    .sidebar { width: 260px; background: var(--bg-sec); border-right: 1px solid var(--border); padding: 24px 16px; position: fixed; height: 100vh; overflow-y: auto; }
    .main { margin-left: 260px; flex: 1; padding: 32px; max-width: 1200px; }
    .nav-section-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-sec); margin-bottom: 8px; }
    .nav-item { display: flex; align-items: center; gap: 10px; width: 100%; padding: 10px 12px; border-radius: 8px; border: none; background: transparent; color: var(--text-sec); font-size: 13px; cursor: pointer; transition: all 0.2s; margin-bottom: 4px; }
    .nav-item:hover, .nav-item.active { background: rgba(13, 148, 136, 0.1); color: var(--brand); }
    .nav-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-sec); }
    .nav-item.ok .nav-dot { background: #22c55e; }
    .nav-item.warn .nav-dot { background: #f59e0b; }
    .nav-item.err .nav-dot { background: #ef4444; }
    h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
    h2 { font-size: 20px; font-weight: 600; margin: 24px 0 12px; }
    .card { background: var(--bg-sec); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
    .card-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-sec); margin-bottom: 12px; }
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .kpi-card { background: var(--bg-sec); border: 1px solid var(--border); border-radius: 12px; padding: 20px; text-align: center; }
    .kpi-value { font-size: 32px; font-weight: 700; color: var(--brand); }
    .kpi-label { font-size: 12px; color: var(--text-sec); margin-top: 4px; }
    .kpi-delta { font-size: 14px; font-weight: 600; margin-top: 8px; }
    .kpi-delta.pos { color: #22c55e; }
    .kpi-delta.neg { color: #ef4444; }
    .kpi-delta.neu { color: var(--text-sec); }
    .data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .data-table th { text-align: left; padding: 10px 12px; border-bottom: 2px solid var(--border); font-weight: 600; color: var(--text-sec); }
    .data-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); }
    .data-table tr:hover { background: rgba(13, 148, 136, 0.05); }
    .code-block { background: #0f172a; border: 1px solid var(--border); border-radius: 8px; padding: 16px; overflow-x: auto; font-family: 'JetBrains Mono', monospace; font-size: 12px; line-height: 1.6; }
    .chart-box { background: var(--bg-sec); border: 1px solid var(--border); border-radius: 12px; padding: 20px; height: 400px; position: relative; }
    .mermaid { background: var(--bg-sec); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
    .tabs { display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 12px; }
    .tab-btn { padding: 8px 16px; border-radius: 8px; border: none; background: transparent; color: var(--text-sec); font-size: 13px; cursor: pointer; }
    .tab-btn.active { background: rgba(13, 148, 136, 0.1); color: var(--brand); font-weight: 600; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    .collapsible { border: 1px solid var(--border); border-radius: 8px; margin-bottom: 12px; }
    .collapsible-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; cursor: pointer; font-weight: 600; }
    .collapsible-body { padding: 0 16px 16px; display: none; }
    .collapsible.open .collapsible-body { display: block; }
    .collapsible.open .chevron { transform: rotate(180deg); }
    .text-block { line-height: 1.7; color: var(--text-sec); }
    .section { margin-bottom: 32px; }
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .main { margin-left: 0; padding: 16px; }
      .kpi-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <aside class="sidebar">
      {% block sidebar %}{% endblock %}
    </aside>
    <main class="main">
      {% block content %}{% endblock %}
    </main>
  </div>
  <script>
    function showTab(btn, panelId) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById(panelId).classList.add('active');
    }
    function toggleCollapsible(header) {
      header.parentElement.classList.toggle('open');
    }
    mermaid.initialize({ startOnLoad: true, theme: '{{ theme | default("dark") }}' === 'dark' ? 'dark' : 'default' });
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>

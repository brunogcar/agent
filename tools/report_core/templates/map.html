{% extends "base.html" %}
{% import "macros.html" as m %}

{% block sidebar %}
<div class="nav-section-label">Map</div>
<button class="nav-item ok active">
  <span class="nav-dot"></span>{{ title | default('Map') }}
</button>
{% endblock %}

{% block content %}
<div style="margin-bottom: 16px;">
  <h1 style="font-size: 24px; font-weight: 700; color: var(--text); margin: 0 0 8px;">{{ title }}</h1>
</div>
<div id="map" style="width: 100%; height: 600px; border-radius: 10px; border: 1px solid var(--border);"></div>

<script>
  var mapConfig = {{ map_config_json | safe }};
  var map = L.map('map').setView(mapConfig.center, mapConfig.zoom);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  var data = mapConfig.data;
  if (data && data.lat && data.lon) {
    for (var i = 0; i < data.lat.length; i++) {
      L.marker([data.lat[i], data.lon[i]]).addTo(map)
        .bindPopup(data.labels ? data.labels[i] : '');
    }
  } else if (Array.isArray(data)) {
    data.forEach(function(item) {
      L.marker([item.lat, item.lon]).addTo(map)
        .bindPopup(item.popup || item.label || '');
    });
  }
</script>
{% endblock %}

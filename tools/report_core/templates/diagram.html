{% extends "base.html" %}
{% import "macros.html" as m %}

{% block sidebar %}
<div class="nav-section-label">Diagram</div>
<button class="nav-item ok active">
  <span class="nav-dot"></span>{{ title | default('Diagram') }}
</button>
{% endblock %}

{% block content %}
<div style="margin-bottom: 16px;">
  <h1 style="font-size: 24px; font-weight: 700; color: var(--text); margin: 0 0 8px;">{{ title }}</h1>
</div>
<div class="mermaid">{{ mermaid_src | safe }}</div>
{% endblock %}

[pytest]
pythonpath = .
testpaths = tests
# [ROUTER FIX] Use importlib import mode to prevent test directory names
# from colliding with real package names (e.g. tests/core/router/ vs core/router.py).
addopts = --import-mode=importlib
# [v1.2] Suppress tree-sitter-languages deprecation warning (uses old API;
# will go away when tree-sitter-languages updates for tree-sitter 0.26+).
filterwarnings =
    ignore::FutureWarning:tree_sitter

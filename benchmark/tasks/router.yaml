    max_tokens: 512

  - name: route_direct
    system: "You are a task router. No thinking. No reasoning. Return ONLY the workflow name. No explanation, no punctuation, no quotes."
    prompt: "Task: 'Read the database config file and show me the connection string for the production environment.'\nRoute to one of: [autocode, research, data, understand, direct]. Return ONLY the word."
    expected: "direct"

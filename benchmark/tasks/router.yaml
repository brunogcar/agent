role: router
tasks:
- name: classify_bug_severity
  system: You are a classifier. No thinking. No reasoning. Return ONLY the classification word. No explanation, no punctuation,
    no quotes.
  prompt: 'Bug report: ''Application crashes on startup for all users. No workaround available. Revenue impact $50K/hour.''

    Classify severity into one of: [critical, high, medium, low]. Return ONLY the word.'
  expected: critical
  validator: fuzzy_match
  validator_args:
    threshold: 0.9
  difficulty: easy
  timeout: 15
  max_tokens: 512
- name: classify_intent
  system: You are a classifier. No thinking. No reasoning. Return ONLY the classification word. No explanation, no punctuation,
    no quotes.
  prompt: 'User request: ''The login page is slow and the UI looks outdated. Can we refresh the design and modernize the layout?''

    Classify intent into one of: [fix_bug, add_feature, refactor, document]. Return ONLY the word.'
  expected: refactor
  validator: fuzzy_match
  validator_args:
    threshold: 0.9
  difficulty: medium
  timeout: 15
  max_tokens: 512
- name: classify_code_language
  system: You are a classifier. No thinking. No reasoning. Return ONLY the classification word. No explanation, no punctuation,
    no quotes.
  prompt: "Classify the programming language of this code:\n```\ndef factorial(n):\n    return n * factorial(n - 1) if n >\
    \ 1 else 1\n```\nOptions: [python, javascript, rust, go]. Return ONLY the word."
  expected: python
  validator: fuzzy_match
  validator_args:
    threshold: 0.9
  difficulty: easy
  timeout: 15
  max_tokens: 512
- name: classify_ambiguous
  system: You are a classifier. No thinking. No reasoning. Return ONLY a JSON array of labels. No explanation.
  prompt: 'Classify this issue into ALL applicable labels from [urgent, security, performance, ux]:

    ''User passwords are stored in plaintext in the database and the login page takes 10 seconds to load.''

    Return ONLY a JSON array.'
  validator: keyword_coverage
  validator_args:
    expected_keywords:
    - security
    - performance
  difficulty: hard
  timeout: 15
  max_tokens: 512
- name: classify_multi_intent
  system: You are a classifier. No thinking. No reasoning. Return ONLY the classification word. No explanation, no punctuation,

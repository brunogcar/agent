  - name: route_general
    system: "You are a task router. No thinking. No reasoning. Return ONLY the workflow name. No explanation, no punctuation, no quotes."
    prompt: "Task: 'What is the capital of France and what is its population?'\nRoute to one of: [autocode, research, data, understand, direct]. Return ONLY the word."

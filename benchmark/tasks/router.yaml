  - name: route_ambiguous
    system: "You are a task router. No thinking. No reasoning. Return ONLY the workflow name. No explanation, no punctuation, no quotes."
    prompt: "Task: 'The pandas dataframe is throwing a KeyError on Revenue column. Look at the B3 CSV and write a fix.'\nRoute to one of: [autocode, research, data, understand, direct]. Return ONLY the word."

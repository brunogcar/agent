role: router
tasks:
  # === CLASSIFY ===
  - name: classify_bug_severity
    system: "You are a classifier. No thinking. No reasoning. Return ONLY the classification word. No explanation, no punctuation, no quotes."
    prompt: "Bug report: 'Application crashes on startup for all users. No workaround available. Revenue impact $50K/hour.'\nClassify severity into one of: [critical, high, medium, low]. Return ONLY the word."
    expected: "critical"
    validator: fuzzy_match
    difficulty: easy
    timeout: 15
    max_tokens: 512

  - name: classify_intent
    system: "You are a classifier. No thinking. No reasoning. Return ONLY the classification word. No explanation, no punctuation, no quotes."
    prompt: "User request: 'The login page is slow and the UI looks outdated. Can we refresh the design and modernize the layout?'\nClassify intent into one of: [fix_bug, add_feature, refactor, document]. Return ONLY the word."
    expected: "refactor"
    validator: fuzzy_match
    difficulty: medium
    timeout: 15
    max_tokens: 512

  - name: classify_code_language
    system: "You are a classifier. No thinking. No reasoning. Return ONLY the classification word. No explanation, no punctuation, no quotes."
    prompt: "Classify the programming language of this code:\n```\ndef factorial(n):\n    return n * factorial(n - 1) if n > 1 else 1\n```\nOptions: [python, javascript, rust, go]. Return ONLY the word."
    expected: "python"
    validator: fuzzy_match
    difficulty: easy
    timeout: 15
    max_tokens: 512

  - name: classify_ambiguous
    system: "You are a classifier. No thinking. No reasoning. Return ONLY a JSON array of labels. No explanation."
    prompt: "Classify this issue into ALL applicable labels from [urgent, security, performance, ux]:\n'User passwords are stored in plaintext in the database and the login page takes 10 seconds to load.'\nReturn ONLY a JSON array."
    # Both security (plaintext passwords) AND performance (10s load) are correct.
    # keyword_coverage gives partial credit if model only catches one issue.
    validator: keyword_coverage
    validator_args:
      expected_keywords: ["security", "performance"]
    difficulty: hard
    timeout: 15
    max_tokens: 512

  - name: classify_multi_intent
    system: "You are a classifier. No thinking. No reasoning. Return ONLY the classification word. No explanation, no punctuation, no quotes."
    prompt: "Bug report: 'The export button throws a NullPointerException when clicking on large datasets.'\nClassify into one of: [fix_bug, add_feature, refactor, document]. Return ONLY the word."
    expected: "fix_bug"
    validator: fuzzy_match
    difficulty: medium
    timeout: 15
    max_tokens: 512

  - name: classify_sentiment
    system: "You are a classifier. No thinking. No reasoning. Return ONLY the classification word. No explanation, no punctuation, no quotes."
    prompt: "Review: 'This product is amazing! Best purchase I have made all year. Highly recommend to everyone.'\nClassify sentiment into one of: [positive, negative, neutral]. Return ONLY the word."
    expected: "positive"
    validator: fuzzy_match
    difficulty: easy
    timeout: 15
    max_tokens: 512

  - name: classify_priority
    system: "You are a classifier. No thinking. No reasoning. Return ONLY the classification word. No explanation, no punctuation, no quotes."
    prompt: "Issue: 'Production database is down, all customers affected, revenue impact estimated at $50K per hour.'\nClassify priority into one of: [p0, p1, p2, p3]. Return ONLY the word."
    expected: "p0"
    validator: fuzzy_match
    difficulty: easy
    timeout: 15
    max_tokens: 512

  - name: classify_category
    system: "You are a classifier. No thinking. No reasoning. Return ONLY the classification word. No explanation, no punctuation, no quotes."
    prompt: "Ticket: 'Documentation for the new API endpoints is missing examples and error codes. Need to update the developer guide.'\nClassify into one of: [bug, feature, docs, refactor]. Return ONLY the word."
    expected: "docs"
    validator: fuzzy_match
    difficulty: easy
    timeout: 15
    max_tokens: 512

  # === ROUTE ===
  - name: route_research
    system: "You are a task router. No thinking. No reasoning. Return ONLY the workflow name. No explanation, no punctuation, no quotes."
    prompt: "Task: 'Search academic databases for recent CRISPR papers and write a literature review with citations.'\nRoute to one of: [autocode, research, data, understand, direct]. Return ONLY the word."
    expected: "research"
    validator: fuzzy_match
    difficulty: easy
    timeout: 15
    max_tokens: 512

  - name: route_autocode
    system: "You are a task router. No thinking. No reasoning. Return ONLY the workflow name. No explanation, no punctuation, no quotes."
    prompt: "Task: 'Implement a Python script with functions to download images from URLs, handle timeouts, and save to disk with retry logic.'\nRoute to one of: [autocode, research, data, understand, direct]. Return ONLY the word."
    expected: "autocode"
    validator: fuzzy_match
    difficulty: easy
    timeout: 15
    max_tokens: 512

  - name: route_data
    system: "You are a task router. No thinking. No reasoning. Return ONLY the workflow name. No explanation, no punctuation, no quotes."
    prompt: "Task: 'Analyze the Q3 sales CSV and create a bar chart showing revenue by region and product category.'\nRoute to one of: [autocode, research, data, understand, direct]. Return ONLY the word."
    expected: "data"
